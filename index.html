<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Channel Analyzer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .welcome-text {
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite, glow 2s ease-in-out infinite;
            letter-spacing: 3px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
            50% { text-shadow: 0 0 40px rgba(255, 255, 255, 1); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes rotate360 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            backdrop-filter: blur(10px);
            animation: slideInUp 0.8s ease-out;
        }

        .form-container h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
            animation: fadeIn 0.6s ease-out;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            animation: slideInLeft 0.6s ease-out;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
            transform: scale(1.02);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            animation: slideInUp 0.6s ease-out;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .hidden {
            display: none;
        }

        .analyzer-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            animation: slideInUp 0.8s ease-out;
        }

        .analyzer-container h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .url-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .url-input-group input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            animation: slideInLeft 0.6s ease-out;
            transition: all 0.3s;
        }

        .url-input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
        }

        .url-input-group button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            animation: slideInRight 0.6s ease-out;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .url-input-group button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s;
        }

        .url-input-group button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .url-input-group button:hover::before {
            left: 100%;
        }

        .channel-info {
            text-align: left;
        }

        .info-item {
            padding: 15px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
            border-radius: 4px;
            animation: slideInLeft 0.6s ease-out;
            transition: all 0.3s;
            cursor: pointer;
        }

        .info-item:hover {
            transform: translateX(5px);
            background: #f0f0ff;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .info-item h3 {
            color: #667eea;
            margin-bottom: 5px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .info-item p {
            color: #333;
            font-size: 16px;
            margin: 0;
        }

        .loading {
            text-align: center;
            padding: 20px;
            animation: fadeIn 0.6s ease-out;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: rotate360 1s linear infinite;
            margin: 0 auto 10px;
        }



        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            animation: slideInLeft 0.4s ease-out;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .back-btn {
            background: #f0f0f0;
            color: #333;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: 600;
            animation: slideInLeft 0.6s ease-out;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #667eea;
            color: white;
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>

        <!-- Login/Register Form -->
        <div class="ui-container" id="authForm">
            <div class="welcome-text">Welcome to Website</div>
            <div class="form-container">
                <h2 id="formTitle">Kirish</h2>
                
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Kirish</button>
                    <button class="tab-btn" onclick="switchTab('register')">Ro'yxat</button>
                </div>

                <!-- Login Form -->
                <div id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Parol</label>
                        <input type="password" id="loginPassword" placeholder="••••••••">
                    </div>
                    <button class="submit-btn" onclick="handleLogin()">Kirish</button>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="hidden">
                    <div class="form-group">
                        <label for="registerName">To'liq ismi</label>
                        <input type="text" id="registerName" placeholder="Ismingiz">
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input type="email" id="registerEmail" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Parol</label>
                        <input type="password" id="registerPassword" placeholder="••••••••">
                    </div>
                    <button class="submit-btn" onclick="handleRegister()">Ro'yxatdan o'tish</button>
                </div>
            </div>
        </div>

        <!-- Analyzer Form -->
        <div class="ui-container hidden" id="analyzerForm">
            <div class="analyzer-container">
                <button class="back-btn" onclick="logout()">← Chiqish</button>
                <h2>YouTube Kanal Analizi</h2>
                <div class="url-input-group">
                    <input type="text" id="youtubeUrl" placeholder="YouTube kanal URL sini kiriting (masalan: https://www.youtube.com/@channelname)">
                    <button onclick="analyzeChannel()">Analiz qilish</button>
                </div>
                <div id="analysisResult"></div>
            </div>
        </div>
    </div>

    <script>
        // Three.js 3D animatsiya
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        document.getElementById('canvas').parentNode.insertBefore(renderer.domElement, renderer.domElement.nextSibling);
        renderer.domElement.id = 'canvas';

        camera.position.z = 5;

        // Geometriya va materiallar
        const geometry = new THREE.IcosahedronGeometry(2, 4);
        const material = new THREE.MeshPhongMaterial({
            color: 0x667eea,
            emissive: 0x764ba2,
            wireframe: false,
            shininess: 100
        });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // Yorug'lik
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        // Animatsiya
        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.x += 0.003;
            mesh.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Auth States
        let currentUser = null;

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const buttons = document.querySelectorAll('.tab-btn');
            const title = document.getElementById('formTitle');

            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                buttons[0].classList.add('active');
                title.textContent = 'Kirish';
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                buttons[1].classList.add('active');
                title.textContent = 'Ro\'yxatdan o\'tish';
            }
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                alert('Barcha maydonlarni to\'ldiring!');
                return;
            }

            currentUser = { email, name: email.split('@')[0] };
            showAnalyzer();
        }

        function handleRegister() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            if (!name || !email || !password) {
                alert('Barcha maydonlarni to\'ldiring!');
                return;
            }

            currentUser = { email, name };
            showAnalyzer();
        }

        function showAnalyzer() {
            document.getElementById('authForm').classList.add('hidden');
            document.getElementById('analyzerForm').classList.remove('hidden');
        }

        function logout() {
            currentUser = null;
            document.getElementById('authForm').classList.remove('hidden');
            document.getElementById('analyzerForm').classList.add('hidden');
            document.getElementById('analysisResult').innerHTML = '';
            document.getElementById('youtubeUrl').value = '';
        }

        function extractChannelId(url) {
            // URL formatlarni qayta ishlash
            let channelId = null;
            
            if (url.includes('@')) {
                // @username formatida
                const match = url.match(/@([a-zA-Z0-9_-]+)/);
                if (match) return match[1];
            } else if (url.includes('/channel/')) {
                // Direct channel ID formatida
                const match = url.match(/\/channel\/([a-zA-Z0-9_-]+)/);
                if (match) return match[1];
            } else if (url.includes('/user/')) {
                const match = url.match(/\/user\/([a-zA-Z0-9_-]+)/);
                if (match) return match[1];
            }
            
            return null;
        }

        async function analyzeChannel() {
            const url = document.getElementById('youtubeUrl').value.trim();
            const resultDiv = document.getElementById('analysisResult');

            if (!url) {
                resultDiv.innerHTML = '<div class="error">URL ni kiriting!</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Kanal tahlil qilinmoqda...</p></div>';

            try {
                // YouTube Data API bilan ishlash uchun, key kerak
                // Demo uchun mock data ko'rsatamiz
                const channelIdentifier = extractChannelId(url);
                
                if (!channelIdentifier) {
                    throw new Error('Noto\'g\'ri YouTube URL formati');
                }

                // Fake data (real API uchun YouTube Data API key kerak)
                const mockAnalysis = {
                    channelName: 'Channel: ' + channelIdentifier,
                    subscribers: Math.floor(Math.random() * 10000000),
                    videoCount: Math.floor(Math.random() * 5000),
                    views: Math.floor(Math.random() * 1000000000),
                    category: 'Technology',
                    description: 'Sample channel description',
                    joinDate: new Date(2020 + Math.random() * 4, 0, 1).toLocaleDateString('uz-UZ')
                };

                displayAnalysis(mockAnalysis);
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Xato: ${error.message}</div>`;
            }
        }

        function displayAnalysis(data) {
            const resultDiv = document.getElementById('analysisResult');
            resultDiv.innerHTML = `
                <div class="channel-info">
                    <div class="info-item">
                        <h3>Kanal Nomi</h3>
                        <p>${data.channelName}</p>
                    </div>
                    <div class="info-item">
                        <h3>Obunachlar</h3>
                        <p>${formatNumber(data.subscribers)}</p>
                    </div>
                    <div class="info-item">
                        <h3>Video Soni</h3>
                        <p>${data.videoCount}</p>
                    </div>
                    <div class="info-item">
                        <h3>Jami Ko'rishlar</h3>
                        <p>${formatNumber(data.views)}</p>
                    </div>
                    <div class="info-item">
                        <h3>Kategoriya</h3>
                        <p>${data.category}</p>
                    </div>
                    <div class="info-item">
                        <h3>Obuna Sanasi</h3>
                        <p>${data.joinDate}</p>
                    </div>
                </div>
            `;
        }

        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }
    </script>
</body>
</html>
