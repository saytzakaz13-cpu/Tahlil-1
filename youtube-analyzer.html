<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Channel Analyzer - Professional Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF0000;
            --primary-dark: #CC0000;
            --secondary: #065FD4;
            --text-light: #030303;
            --text-muted: #606060;
            --bg-light: #FFFFFF;
            --bg-dark: #F9F9F9;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--secondary) 0%, #003f99 100%);
            min-height: 100vh;
            color: var(--text-light);
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ===== AUTH FORM ===== */
        .auth-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 50px 40px;
            backdrop-filter: blur(10px);
            animation: slideInUp 0.8s ease-out;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.6s ease-out;
        }

        .hero-icon {
            font-size: 48px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        .hero-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--bg-dark);
            padding: 5px;
            border-radius: 10px;
        }

        .tab-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
            transition: all 0.3s ease;
            animation: fadeIn 0.6s ease-out;
        }

        .tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: slideInUp 0.4s ease-out;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            animation: slideInLeft 0.6s ease-out;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 0, 0, 0.02);
            box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: slideInUp 0.6s ease-out;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        /* ===== DASHBOARD ===== */
        .dashboard-container {
            display: none;
            width: 100%;
            height: 100%;
            max-width: 1400px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: slideInUp 0.8s ease-out;
        }

        .dashboard-container.active {
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            padding: 30px;
            border-bottom: 1px solid #E0E0E0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-light);
        }

        .logout-btn {
            background: var(--bg-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--primary);
            color: white;
        }

        .search-section {
            padding: 30px;
            border-bottom: 1px solid #E0E0E0;
            background: var(--bg-dark);
        }

        .search-wrapper {
            display: flex;
            gap: 10px;
            animation: slideInUp 0.6s ease-out;
        }

        .search-wrapper input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.1);
        }

        .search-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
        }

        .dashboard-content {
            padding: 30px;
            flex: 1;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #E0E0E0;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: rotate360 1s linear infinite;
            margin: 0 auto 20px;
        }

        .error {
            background: #FFEBEE;
            border: 2px solid var(--primary);
            color: var(--primary-dark);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: slideInLeft 0.4s ease-out;
        }

        .channel-header {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 30px;
            margin-bottom: 40px;
            animation: slideInUp 0.6s ease-out;
        }

        .channel-avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .channel-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .channel-details h3 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-light);
        }

        .channel-meta {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .meta-item {
            text-align: center;
        }

        .meta-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .meta-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--bg-dark);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s ease;
            animation: slideInUp 0.6s ease-out;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-light);
        }

        .card-change {
            font-size: 12px;
            margin-top: 10px;
            color: var(--text-muted);
        }

        .chart-container {
            background: var(--bg-dark);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            animation: slideInUp 0.6s ease-out;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-light);
        }

        .description {
            background: var(--bg-dark);
            padding: 20px;
            border-radius: 12px;
            line-height: 1.6;
            color: var(--text-light);
            animation: slideInUp 0.6s ease-out;
        }

        .links-section {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .link-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #E0E0E0;
            text-decoration: none;
            color: var(--secondary);
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
            animation: slideInLeft 0.6s ease-out;
        }

        .link-item:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes rotate360 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .auth-container {
                max-width: 100%;
                padding: 30px 20px;
            }

            .dashboard-container {
                max-width: 100%;
            }

            .channel-header {
                grid-template-columns: 1fr;
            }

            .channel-meta {
                grid-template-columns: repeat(2, 1fr);
            }

            .hero-title {
                font-size: 24px;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>
        <div class="content">
            <!-- Auth Form -->
            <div class="auth-container" id="authForm">
                <div class="hero-section">
                    <div class="hero-icon">🎥</div>
                    <h1 class="hero-title">YouTube Analytics</h1>
                    <p class="hero-subtitle">Kanalning barcha ma'lumotlarini analiz qiling</p>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Kirish</button>
                    <button class="tab-btn" onclick="switchTab('register')">Ro'yxat</button>
                </div>

                <form id="loginForm" class="form-section active" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="siz@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Parol</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="submit-btn">Kirish</button>
                </form>

                <form id="registerForm" class="form-section" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>To'liq ismi</label>
                        <input type="text" id="registerName" placeholder="Ismingiz" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" placeholder="siz@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Parol</label>
                        <input type="password" id="registerPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="submit-btn">Ro'yxatdan o'tish</button>
                </form>
            </div>

            <!-- Dashboard -->
            <div class="dashboard-container" id="dashboard">
                <div class="dashboard-header">
                    <h2>YouTube Kanal Analizi</h2>
                    <button class="logout-btn" onclick="logout()">Chiqish</button>
                </div>

                <div class="search-section">
                    <div class="search-wrapper">
                        <input type="text" id="channelUrl" placeholder="YouTube kanal URL sini kiriting: https://www.youtube.com/@kanalnomu yoki https://www.youtube.com/user/username">
                        <button class="search-btn" onclick="analyzeChannel()">Analiz qilish</button>
                    </div>
                </div>

                <div class="dashboard-content">
                    <div id="analysisResult"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== THREE.JS 3D BACKGROUND =====
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        document.getElementById('canvas').replaceWith(renderer.domElement);
        renderer.domElement.id = 'canvas';
        camera.position.z = 5;

        // Create rotating geometries
        const geometries = [
            new THREE.IcosahedronGeometry(1.5, 4),
            new THREE.TetrahedronGeometry(1.5, 0),
            new THREE.OctahedronGeometry(1.5, 0)
        ];

        const materials = [
            new THREE.MeshPhongMaterial({ color: 0xFF0000, emissive: 0xFF0000, wireframe: false, shininess: 100 }),
            new THREE.MeshPhongMaterial({ color: 0x065FD4, emissive: 0x065FD4, wireframe: false, shininess: 100 }),
            new THREE.MeshPhongMaterial({ color: 0xFF0000, emissive: 0x065FD4, wireframe: false, shininess: 100 })
        ];

        const meshes = geometries.map((geom, i) => {
            const mesh = new THREE.Mesh(geom, materials[i]);
            mesh.position.x = (i - 1) * 4;
            scene.add(mesh);
            return mesh;
        });

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        function animateThree() {
            requestAnimationFrame(animateThree);
            meshes.forEach((mesh, i) => {
                mesh.rotation.x += 0.003 + i * 0.001;
                mesh.rotation.y += 0.005 + i * 0.001;
            });
            renderer.render(scene, camera);
        }
        animateThree();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ===== AUTH LOGIC =====
        let currentUser = null;

        function switchTab(tab) {
            document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.getElementById('registerForm').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            currentUser = { email, name: email.split('@')[0] };
            showDashboard();
        }

        function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const name = document.getElementById('registerName').value;
            currentUser = { email, name };
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('authForm').classList.add('hidden');
            document.getElementById('dashboard').classList.add('active');
        }

        function logout() {
            currentUser = null;
            document.getElementById('authForm').classList.remove('hidden');
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('analysisResult').innerHTML = '';
            document.getElementById('channelUrl').value = '';
        }

        // ===== YOUTUBE ANALYSIS =====
        async function analyzeChannel() {
            const url = document.getElementById('channelUrl').value.trim();
            const result = document.getElementById('analysisResult');

            if (!url) {
                result.innerHTML = '<div class="error">❌ URL ni kiriting!</div>';
                return;
            }

            result.innerHTML = '<div class="loading"><div class="spinner"></div><p>Kanal tahlil qilinmoqda...</p></div>';

            try {
                const channelData = await fetchYouTubeData(url);
                if (channelData) {
                    displayChannelAnalysis(channelData);
                } else {
                    result.innerHTML = '<div class="error">❌ Kanal topilmadi. URL ni to\'g\'ri kiriting!</div>';
                }
            } catch (error) {
                result.innerHTML = `<div class="error">❌ Xato: ${error.message}</div>`;
            }
        }

        async function fetchYouTubeData(url) {
            // Google Custom Search API orqali kanal ma'lumotlarini olish
            // Agarda real API key bo'lsa, bu o'riniga real API chaqiriladi
            
            // URL dan kanal nomini chiqarish
            let channelHandle = '';
            
            if (url.includes('@')) {
                const match = url.match(/@([a-zA-Z0-9_.-]+)/);
                channelHandle = match ? match[1] : '';
            } else if (url.includes('/user/')) {
                const match = url.match(/\/user\/([a-zA-Z0-9_.-]+)/);
                channelHandle = match ? match[1] : '';
            } else if (url.includes('/channel/')) {
                const match = url.match(/\/channel\/([a-zA-Z0-9_-]+)/);
                channelHandle = match ? match[1] : '';
            }

            if (!channelHandle) {
                return null;
            }

            // Mock data (real API bilan almashtiriladi)
            const mockData = {
                channelName: channelHandle,
                customUrl: `@${channelHandle}`,
                subscribers: Math.floor(Math.random() * 50000000) + 1000,
                videoCount: Math.floor(Math.random() * 5000) + 10,
                totalViews: Math.floor(Math.random() * 5000000000) + 1000000,
                joinDate: new Date(2015 + Math.random() * 9, Math.floor(Math.random() * 12), 1).toLocaleDateString('uz-UZ'),
                description: `${channelHandle} kanalida siz qiziqarli videolarni topaolasiz. Har hafta yangi kontentlar!`,
                verified: Math.random() > 0.5,
                country: 'Uzbekistan'
            };

            return mockData;
        }

        function displayChannelAnalysis(data) {
            const result = document.getElementById('analysisResult');
            
            const avgViewsPerVideo = Math.floor(data.totalViews / data.videoCount);
            const monthlyGrowth = Math.floor(Math.random() * 15) + 2;

            result.innerHTML = `
                <div class="channel-header">
                    <div class="channel-avatar">
                        ${data.verified ? '✅' : '📺'}
                    </div>
                    <div class="channel-details">
                        <h3>${data.channelName} ${data.verified ? '✓' : ''}</h3>
                        <p style="color: #606060; margin-bottom: 20px;">${data.customUrl}</p>
                        <p style="color: #030303; line-height: 1.6; margin-bottom: 20px;">${data.description}</p>
                        <div class="channel-meta">
                            <div class="meta-item">
                                <div class="meta-value">${formatNumber(data.subscribers)}</div>
                                <div class="meta-label">Obunachlar</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-value">${data.videoCount}</div>
                                <div class="meta-label">Videolar</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-value">${formatNumber(data.totalViews)}</div>
                                <div class="meta-label">Ko'rishlar</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-value">+${monthlyGrowth}%</div>
                                <div class="meta-label">O'ylik O'sish</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="analytics-grid">
                    <div class="card">
                        <div class="card-title">O'rtacha Ko'rishlar (Video bo'yicha)</div>
                        <div class="card-value">${formatNumber(avgViewsPerVideo)}</div>
                        <div class="card-change">🔝 Video o'rtachasi</div>
                    </div>
                    <div class="card">
                        <div class="card-title">Kanal Yaratildi</div>
                        <div class="card-value" style="font-size: 18px;">${data.joinDate}</div>
                        <div class="card-change">📅 Obuna qilgan sana</div>
                    </div>
                    <div class="card">
                        <div class="card-title">O'rtacha Engagement</div>
                        <div class="card-value">${(Math.random() * 10).toFixed(2)}%</div>
                        <div class="card-change">👥 Foydalanuvchi interaksiyasi</div>
                    </div>
                </div>

                <div class="chart-container">
                    <div class="chart-title">📊 O'ylik Ko'rishlar Trendi</div>
                    <canvas id="viewsChart"></canvas>
                </div>

                <div class="chart-container">
                    <div class="chart-title">📈 Kanal O'sish Analizi</div>
                    <canvas id="growthChart"></canvas>
                </div>

                <div class="description">
                    <h4 style="margin-bottom: 15px; color: #030303;">📝 Kanal Tavsifi</h4>
                    <p>${data.description}</p>
                </div>

                <div class="links-section">
                    <a href="https://www.youtube.com/@${data.channelName}" target="_blank" class="link-item">
                        🎥 Kanalga o'tish
                    </a>
                    <a href="https://www.youtube.com/@${data.channelName}/videos" target="_blank" class="link-item">
                        📹 Barcha Videolar
                    </a>
                    <a href="https://www.youtube.com/@${data.channelName}/about" target="_blank" class="link-item">
                        ℹ️ Kanal Haqida
                    </a>
                </div>
            `;

            // Draw charts after data is loaded
            setTimeout(() => {
                drawChartsForChannel(data);
            }, 100);
        }

        function drawChartsForChannel(data) {
            // Views chart
            const viewsCtx = document.getElementById('viewsChart');
            if (viewsCtx) {
                const monthlyViews = Array.from({ length: 12 }, () => Math.floor(Math.random() * data.totalViews / 100));
                new Chart(viewsCtx, {
                    type: 'line',
                    data: {
                        labels: ['Yan', 'Fev', 'Mar', 'Apr', 'May', 'Iyn', 'Iyl', 'Avg', 'Sen', 'Okt', 'Noy', 'Dek'],
                        datasets: [{
                            label: 'Ko\'rishlar',
                            data: monthlyViews,
                            borderColor: '#FF0000',
                            backgroundColor: 'rgba(255, 0, 0, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#FF0000',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                display: true,
                                labels: { color: '#030303', font: { size: 12, weight: 'bold' } }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { color: '#606060' },
                                grid: { color: 'rgba(0, 0, 0, 0.05)' }
                            },
                            x: {
                                ticks: { color: '#606060' },
                                grid: { color: 'rgba(0, 0, 0, 0.05)' }
                            }
                        }
                    }
                });
            }

            // Growth chart
            const growthCtx = document.getElementById('growthChart');
            if (growthCtx) {
                const months = Array.from({ length: 12 }, (_, i) => {
                    const d = new Date();
                    d.setMonth(d.getMonth() - 11 + i);
                    return d.toLocaleDateString('uz-UZ', { month: 'short' });
                });
                const subscriberGrowth = Array.from({ length: 12 }, (_, i) => 
                    Math.floor(data.subscribers * (0.5 + i * 0.04))
                );

                new Chart(growthCtx, {
                    type: 'bar',
                    data: {
                        labels: months,
                        datasets: [{
                            label: 'Obunachlar',
                            data: subscriberGrowth,
                            backgroundColor: '#065FD4',
                            borderColor: '#003f99',
                            borderWidth: 2,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                display: true,
                                labels: { color: '#030303', font: { size: 12, weight: 'bold' } }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { color: '#606060' },
                                grid: { color: 'rgba(0, 0, 0, 0.05)' }
                            },
                            x: {
                                ticks: { color: '#606060' },
                                grid: { color: 'rgba(0, 0, 0, 0.05)' }
                            }
                        }
                    }
                });
            }
        }

        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }
    </script>
</body>
</html>
